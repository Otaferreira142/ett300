      [3,6,'Física','',          '11:30','12:20'],
      [4,1,'Português','',       '07:00','07:50'],
      [4,2,'Ciências','',        '07:50','08:40'],
      [4,3,'Geografia','',       '08:40','09:30'],
      [4,4,'Química','',         '09:50','10:40'],
      [4,5,'História','',        '10:40','11:30'],
      [4,6,'Arte','',            '11:30','12:20'],
    ];
    set('schedule', def.map(([day,period,subject,teacher,startTime,endTime]) =>
      ({ id:uid(), day, period, subject, teacher, startTime, endTime })
    ));
  }
  // Auto-login

function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPassword').value;
  const u     = get('users').find(x => x.email.toLowerCase() === email.toLowerCase() && x.password === pw);
  if (!u) {
    const el = document.getElementById('loginAlert');
    el.textContent = '❌ E-mail ou senha incorretos.';
    el.style.display = 'block';
    return;
  }
  document.getElementById('loginAlert').style.display = 'none';
  S.user = u;
  localStorage.setItem('ett_session', u.id);
  showApp();
}

function logout() {
  S.user = null;
  localStorage.removeItem('ett_session');
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
}

function showApp() {

function buildNav() {
  const items = NAV.filter(n => !n.adminOnly || S.user.role === 'admin');
  document.getElementById('sidebarNav').innerHTML = items.map(n => `
    <div class="nav-item ${S.page===n.id?'active':''}" onclick="navigate('${n.id}')">
      <span class="nav-icon">${n.icon}</span> ${n.label}

// UTILS
// ──────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function now() { return new Date().toISOString(); }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function fmtDate(iso) {
  const d = new Date(iso);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function fmtDT(iso) {
  const d = new Date(iso);
  return `${fmtDate(iso)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function ago(iso) {
  const m = Math.floor((Date.now()-new Date(iso).getTime())/60000);
  if (m < 1) return 'agora';
  if (m < 60) return `${m}min atrás`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h}h atrás`;
  return fmtDate(iso);
}
function isAdmin() { return S.user?.role === 'admin'; }
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, ms=2600) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}
function fmtBytes(b) {
  if (b < 1024) return b+'B';
  if (b < 1048576) return (b/1024).toFixed(1)+'KB';
  return (b/1048576).toFixed(1)+'MB';
}

// ──────────────────────────────────────────────────────────
// ATTENDANCE
// ──────────────────────────────────────────────────────────
const ATT = { date: todayStr(), period: 1, records: {}, editing: false };

function renderAttendance() {
  return isAdmin() ? _attendanceAdmin() : _attendanceStudent();
}

function _attendanceAdmin() {
  const sched   = get('schedule');
  const students = get('users').filter(u=>u.role==='student');
  const dow = new Date(ATT.date+'T12:00:00').getDay();
  const dayIdx = dow===0?6:dow-1;
  const daySched = sched.filter(s=>s.day===dayIdx).sort((a,b)=>a.period-b.period);
  const attendance = get('attendance');
  const existing = attendance.find(a=>a.date===ATT.date && a.period===ATT.period);

  if (existing && !ATT.editing) {
    ATT.records = {};
    existing.records.forEach(r=>{ ATT.records[r.studentId]=r.present; });
  }
  const slot = daySched.find(s=>s.period===ATT.period);
  const presentCount = students.filter(s => (ATT.records[s.id]!==undefined ? ATT.records[s.id] : true)).length;

  return `
  <div class="page-header"><div><div class="page-title">✅ Chamada</div><div class="page-subtitle">Registre a presença por horário</div></div></div>
  <div class="card">
    <div class="grid-2" style="gap:12px;margin-bottom:16px">
      <div><div class="form-label">Data</div><input type="date" class="form-input" value="${ATT.date}" onchange="ATT.date=this.value;ATT.editing=false;ATT.records={};navigate('attendance')"></div>
      <div><div class="form-label">Horário</div>
        <select class="form-select" onchange="ATT.period=+this.value;ATT.editing=false;ATT.records={};navigate('attendance')">
          ${[1,2,3,4,5,6].map(p=>{const sl=daySched.find(s=>s.period===p);return `<option value="${p}" ${ATT.period===p?'selected':''}>${p}º Horário${sl?` — ${sl.subject}`:''}</option>`;}).join('')}
        </select>
      </div>
    </div>
    ${slot?`<div class="alert alert-info">📖 <strong>${esc(slot.subject)}</strong>${slot.teacher?` — Prof. ${esc(slot.teacher)}`:''} &nbsp;|&nbsp; ${slot.startTime}–${slot.endTime}</div>`:''}
    ${existing&&!ATT.editing?`<div class="alert alert-success">✅ Chamada salva: ${existing.records.filter(r=>r.present).length}/${existing.records.length} presentes. <button class="btn btn-sm btn-outline" onclick="ATT.editing=true;navigate('attendance')" style="margin-left:8px">✏️ Editar</button></div>`:''}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="card-title">👥 Alunos (${students.length})</div>
      <div style="font-size:13px;color:var(--text-2)">${presentCount} presentes</div>
    </div>
    ${!students.length?`<div class="empty-state"><div class="es-icon">👥</div><p>Nenhum aluno cadastrado.<br><a href="#" onclick="navigate('users')">Cadastrar alunos →</a></p></div>`:`
    <div id="attList">
      ${students.map(s=>{const p=ATT.records[s.id]!==undefined?ATT.records[s.id]:true;return `
        <div class="student-row">
          <div style="display:flex;align-items:center;gap:10px;font-weight:500;font-size:14px">
            <div class="avatar" style="width:34px;height:34px;font-size:13px">${s.name[0]}</div>
            ${esc(s.name)}
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span id="pl_${s.id}" style="font-size:12px;font-weight:700;color:${p?'var(--success)':'var(--danger)'}">${p?'Presente':'Faltou'}</span>
            <label class="toggle"><input type="checkbox" ${p?'checked':''} onchange="toggleAtt('${s.id}',this.checked)"><span class="toggle-slider"></span></label>
          </div>
        </div>`;}).join('')}
    </div>
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end">
      <button class="btn btn-outline btn-sm" onclick="markAll(true)">✅ Todos Presentes</button>
      <button class="btn btn-outline btn-sm" onclick="markAll(false)">❌ Todos Ausentes</button>
      <button class="btn btn-primary" onclick="saveAtt()">💾 Salvar Chamada</button>
    </div>`}
  </div>
  <div class="card">
    <div class="card-title" style="margin-bottom:14px">📊 Histórico de Chamadas</div>
    ${_attHistory()}
  </div>`;
}

function toggleAtt(sid, present) {
  ATT.records[sid] = present;
  const el = document.getElementById('pl_'+sid);
  if (el) { el.textContent = present?'Presente':'Faltou'; el.style.color = present?'var(--success)':'var(--danger)'; }
}

function markAll(present) {
  get('users').filter(u=>u.role==='student').forEach(s=>{ ATT.records[s.id]=present; });
  navigate('attendance');
}

function saveAtt() {
  const students = get('users').filter(u=>u.role==='student');
  if (!students.length) { toast('Cadastre alunos primeiro'); return; }
  const records = students.map(s=>({ studentId:s.id, present: ATT.records[s.id]!==undefined?ATT.records[s.id]:true }));
  let att = get('attendance');
  const idx = att.findIndex(a=>a.date===ATT.date&&a.period===ATT.period);
  const entry = { id:uid(), date:ATT.date, period:ATT.period, records, by:S.user.id, at:now() };
  if (idx>=0) att[idx]=entry; else att.push(entry);
  set('attendance',att);
  ATT.editing = false;
  toast('✅ Chamada salva!');
  navigate('attendance');
}

function _attHistory() {
  const att = [...get('attendance')].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20);
  if (!att.length) return '<div class="empty-state"><div class="es-icon">📋</div><p>Nenhuma chamada registrada</p></div>';
  return att.map(a=>{
    const p=a.records.filter(r=>r.present).length; const t=a.records.length; const pct=t?Math.round(p/t*100):0;
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
      <div><div style="font-weight:600;font-size:14px">${a.date} — ${a.period}º Horário</div><div style="font-size:12px;color:var(--text-2)">${p}/${t} presentes</div></div>
      <span class="presence-badge ${pct>=75?'presence-p':'presence-f'}">${pct}%</span>
    </div>`;
  }).join('');
}

function _attendanceStudent() {
  const uid2 = S.user.id;
  const recs = [];
  get('attendance').forEach(a=>{ const r=a.records.find(x=>x.studentId===uid2); if(r) recs.push({date:a.date,period:a.period,present:r.present}); });
  recs.sort((a,b)=>b.date.localeCompare(a.date)||b.period-a.period);
  const total=recs.length, present=recs.filter(r=>r.present).length;
  const pct=total?Math.round(present/total*100):0;
  return `
  <div class="page-header"><div><div class="page-title">✅ Minhas Presenças</div><div class="page-subtitle">Histórico de frequência</div></div></div>
  <div class="card" style="text-align:center;padding:32px">
    <div style="font-size:52px;font-weight:900;color:${pct>=75?'var(--success)':'var(--danger)'}">${pct}%</div>
    <div style="color:var(--text-2);font-size:14px;margin-top:6px">${present} de ${total} aulas registradas</div>
    <div class="history-bar" style="margin-top:16px"><div class="history-bar-fill" style="width:${pct}%;background:${pct>=75?'var(--success)':'var(--danger)'}"></div></div>
    <div style="font-size:12px;color:var(--text-3);margin-top:8px">Mínimo exigido: 75%</div>
  </div>
  <div class="card">
    <div class="card-title" style="margin-bottom:14px">📋 Histórico Detalhado</div>
    ${!recs.length?'<div class="empty-state"><div class="es-icon">📭</div><p>Nenhuma chamada registrada ainda</p></div>':
      recs.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:14px">${r.date} — ${r.period}º Horário</span><span class="presence-badge ${r.present?'presence-p':'presence-f'}">${r.present?'✅ Presente':'❌ Falta'}</span></div>`).join('')}
  </div>`;
}

        ${a.description?`<div style="font-size:14px;color:var(--text-2);margin-top:10px;line-height:1.6">${esc(a.description)}</div>`:''}
        ${a.files&&a.files.length?`<div>${a.files.map(f=>`<div class="file-item" onclick="dlFile('${a.id}','${f.id}')"><span class="file-icon">${f.type==='pdf'?'📄':'🖼️'}</span><div><div class="file-name">${esc(f.name)}</div><div class="file-size">${f.size}</div></div></div>`).join('')}</div>`:''}
        <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="tag tag-blue">${esc(a.subject)}</span>
          <button class="btn btn-sm btn-outline" onclick="openActChat('${a.id}')" style="margin-left:auto">💬 Chat da Atividade ${msgCnt?`(${msgCnt})`:''}
          </button>
        </div>
      </div>`;}).join('')}`;
}

function showActivityModal() {
  modal(`
    <div class="modal-header"><div class="modal-title">📚 Nova Atividade</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-row"><label class="form-label">Título *</label><input type="text" class="form-input" id="aTitle" placeholder="Ex: Trabalho de História"></div>
      <div class="grid-2" style="gap:12px">
        <div class="form-row"><label class="form-label">Professor *</label><input type="text" class="form-input" id="aTeacher" placeholder="Nome do professor"></div>
        <div class="form-row"><label class="form-label">Matéria *</label><input type="text" class="form-input" id="aSubject" placeholder="Ex: Matemática"></div>
      </div>
      <div class="form-row"><label class="form-label">Descrição</label><textarea class="form-textarea" id="aDesc" rows="3" placeholder="Descreva a atividade..."></textarea></div>
      <div class="form-row"><label class="form-label">Anexos (PDF ou Imagem)</label><input type="file" id="aFiles" accept=".pdf,image/*" multiple style="width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:8px;font-size:13px"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveActivity()">📚 Criar Atividade</button></div>`);
}

async function saveActivity() {
  const title  = document.getElementById('aTitle').value.trim();
  const teacher= document.getElementById('aTeacher').value.trim();
  const subject= document.getElementById('aSubject').value.trim();
  const desc   = document.getElementById('aDesc').value.trim();
  if (!title||!teacher||!subject) { toast('Preencha os campos obrigatórios'); return; }
  const files = [];
  for (const f of document.getElementById('aFiles').files) {
    const data = await readB64(f);
    files.push({ id:uid(), name:f.name, type:f.type.includes('pdf')?'pdf':'image', size:fmtBytes(f.size), data });
  }
  const acts = get('activities');
  acts.push({id:uid(),title,teacher,subject,description:desc,files,by:S.user.id,createdAt:now()});
  set('activities',acts); closeModal(); toast('📚 Atividade criada!'); navigate('activities');
}

function readB64(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); });
}

function dlFile(aId, fId) {
  const a=get('activities').find(x=>x.id===aId); const f=a?.files.find(x=>x.id===fId); if(!f) return;
  const el=document.createElement('a'); el.href=f.data; el.download=f.name; el.click();
}

function delActivity(id) {
  if (!confirm('Excluir esta atividade?')) return;
  set('activities',get('activities').filter(a=>a.id!==id)); toast('Atividade excluída'); navigate('activities');
}

function openActChat(id) { S.chatActivityId=id; navigate('chat'); }

// ──────────────────────────────────────────────────────────
// AGENDA
// ──────────────────────────────────────────────────────────
function renderAgenda() {
  const agenda=[...get('agenda')].sort((a,b)=>a.date.localeCompare(b.date));
  const upcoming=agenda.filter(a=>a.date>=todayStr());
  const past=agenda.filter(a=>a.date<todayStr()).reverse();
  return `
  <div class="page-header">
    <div><div class="page-title">📅 Agenda</div><div class="page-subtitle">Eventos e compromissos</div></div>
    ${isAdmin()?`<button class="btn btn-primary" onclick="showAgendaModal()">+ Novo Evento</button>`:''}
  </div>
  ${!upcoming.length&&!past.length?'<div class="empty-state card"><div class="es-icon">🗓️</div><p>Nenhum evento cadastrado</p></div>':''}
  ${upcoming.length?`<div class="section-divider"><span>PRÓXIMOS EVENTOS (${upcoming.length})</span></div>${upcoming.map(a=>_agendaItem(a)).join('')}`:''}
  ${past.length?`<div class="section-divider" style="margin-top:20px"><span>EVENTOS PASSADOS</span></div>${past.map(a=>_agendaItem(a,true)).join('')}`:''}`;
}

function _agendaItem(a,past=false) {
  const d=new Date(a.date+'T12:00:00');
  const dow=DAYS[d.getDay()-1]||'Dom';
  return `<div class="agenda-item" style="${past?'opacity:.55':''}">
    <div class="agenda-date-box" style="${past?'background:var(--text-3)':''}"><div class="agenda-day">${d.getDate()}</div><div class="agenda-month">${MONTHS[d.getMonth()]}</div></div>
    <div class="agenda-content" style="flex:1">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="agenda-title">${esc(a.title)}</div>
          ${a.description?`<div class="agenda-desc">${esc(a.description)}</div>`:''}
          <div class="agenda-time">🕐 ${a.time||'Todo o dia'} &nbsp;·&nbsp; ${dow}</div>
        </div>
        ${isAdmin()?`<button class="btn btn-sm btn-danger" onclick="delAgenda('${a.id}')">🗑️</button>`:''}
      </div>
    </div>
  </div>`;
}

function showAgendaModal() {
  modal(`
    <div class="modal-header"><div class="modal-title">📅 Novo Evento</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-row"><label class="form-label">Título *</label><input type="text" class="form-input" id="evTitle" placeholder="Ex: Prova de Matemática"></div>
      <div class="grid-2" style="gap:12px">
        <div class="form-row"><label class="form-label">Data *</label><input type="date" class="form-input" id="evDate" value="${todayStr()}"></div>
        <div class="form-row"><label class="form-label">Horário</label><input type="time" class="form-input" id="evTime"></div>
      </div>
      <div class="form-row"><label class="form-label">Descrição</label><textarea class="form-textarea" id="evDesc" rows="3" placeholder="Detalhes do evento..."></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveAgenda()">📅 Criar Evento</button></div>`);
}

function saveAgenda() {
  const title=document.getElementById('evTitle').value.trim();
  const date=document.getElementById('evDate').value;
  const time=document.getElementById('evTime').value;
  const desc=document.getElementById('evDesc').value.trim();
  if (!title||!date) { toast('Preencha os campos obrigatórios'); return; }
  const ag=get('agenda'); ag.push({id:uid(),title,date,time,description:desc,by:S.user.id,createdAt:now()});
  set('agenda',ag); closeModal(); toast('📅 Evento criado!'); navigate('agenda');
}

function delAgenda(id) {
  if (!confirm('Excluir este evento?')) return;
  set('agenda',get('agenda').filter(a=>a.id!==id)); toast('Evento excluído'); navigate('agenda');
}

// ──────────────────────────────────────────────────────────
// CHAT
// ──────────────────────────────────────────────────────────
function renderChat() {
  const acts=get('activities');
  const act=S.chatActivityId?acts.find(a=>a.id===S.chatActivityId):null;
  const msgs=get('messages').filter(m=>m.actId===(S.chatActivityId||null));

  return `
  <div class="page-header" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:10px">
      ${S.chatActivityId?`<button class="btn btn-ghost btn-sm" onclick="S.chatActivityId=null;navigate('chat')">← Voltar</button>`:''}
      <div>
        <div class="page-title">💬 ${act?`Chat: ${esc(act.title)}`:'Chat da Sala ETT300'}</div>
        <div class="page-subtitle">${act?esc(act.subject):'Conversa geral da turma'}</div>
      </div>
    </div>
  </div>
  ${!act?`
  <div class="card" style="margin-bottom:16px">
    <div class="card-title" style="margin-bottom:12px">📚 Chats por Atividade</div>
    ${!acts.length?'<p style="font-size:14px;color:var(--text-3)">Nenhuma atividade cadastrada</p>':
      acts.map(a=>{const c=get('messages').filter(m=>m.actId===a.id).length;return `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="S.chatActivityId='${a.id}';navigate('chat')">
          <div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">📚</span><div><div style="font-weight:700;font-size:14px">${esc(a.title)}</div><div style="font-size:12px;color:var(--text-2)">${esc(a.subject)}</div></div></div>
          <span class="tag tag-blue">${c} msg${c!==1?'s':''}</span>
        </div>`;}).join('')}
    <div class="section-divider" style="margin-bottom:0"><span>CHAT GERAL ABAIXO</span></div>
  </div>`:''}
  <div class="chat-wrap">
    <div class="chat-messages" id="chatMsgs">
      ${_renderMsgList(msgs)}
    </div>
    <div class="chat-input-row">
      <input type="text" class="chat-input" id="chatIn" placeholder="Escreva uma mensagem..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="chat-send" onclick="sendMsg()">➤</button>
    </div>
  </div>`;
}

function _renderMsgList(msgs) {
  if (!msgs.length) return '<div class="empty-state"><div class="es-icon">💬</div><p>Nenhuma mensagem ainda. Seja o primeiro!</p></div>';
  return msgs.map(m=>{
    const mine=m.uid===S.user.id;
    return `<div class="chat-msg ${mine?'mine':''}">
      <div class="avatar" style="width:30px;height:30px;font-size:12px;flex-shrink:0">${m.uName[0]}</div>
      <div>
        ${!mine?`<div class="chat-sender">${esc(m.uName)}</div>`:''}
        <div class="chat-bubble">${esc(m.text)}</div>
        <div class="chat-time" style="${mine?'text-align:right':''}">${ago(m.at)}</div>
      </div>
    </div>`;}).join('');
}

function initChatScroll() {
  const el = document.getElementById('chatMsgs');
  if (el) el.scrollTop = el.scrollHeight;
}

function sendMsg() {
  const inp=document.getElementById('chatIn'); const text=inp.value.trim(); if(!text) return;
  const msgs=get('messages');
  msgs.push({id:uid(),text,uid:S.user.id,uName:S.user.name,actId:S.chatActivityId||null,at:now()});
  set('messages',msgs); inp.value='';
  const el=document.getElementById('chatMsgs');
  if (el) { el.innerHTML=_renderMsgList(get('messages').filter(m=>m.actId===(S.chatActivityId||null))); el.scrollTop=el.scrollHeight; }
}

// ──────────────────────────────────────────────────────────
// SCHEDULE
// ──────────────────────────────────────────────────────────
function renderSchedule() {
  const sched=get('schedule');
  const periods=[1,2,3,4,5,6];
  const days=[0,1,2,3,4,5];
  function getTime(p) { const s=sched.find(x=>x.period===p); return s?`${s.startTime}–${s.endTime}`:''; }

  return `
  <div class="page-header">
    <div><div class="page-title">🕐 Horários</div><div class="page-subtitle">Grade de aulas da sala ETT300</div></div>
    ${isAdmin()?`<button class="btn btn-primary btn-sm" onclick="showSchedModal()">✏️ Editar Grade</button>`:''}
  </div>
  <div class="card" style="padding:0;overflow:auto;margin-bottom:20px">
    <table class="schedule-table">
      <thead><tr>
        <th style="min-width:80px">Horário</th>
        ${DAYS.map(d=>`<th>${d}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${periods.map(p=>`<tr>
          <td style="white-space:nowrap"><div style="font-weight:800;font-size:13px">${p}º</div><div style="font-size:10px;color:var(--text-3)">${getTime(p)}</div></td>
          ${days.map(d=>{ const sl=sched.find(s=>s.day===d&&s.period===p); return sl?`<td><div class="sched-subj">${esc(sl.subject)}</div>${sl.teacher?`<div class="sched-tchr">${esc(sl.teacher)}</div>`:''}</td>`:`<td style="color:var(--text-3)">—</td>`; }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>
  </div>
  <div class="card">
    <div class="card-title" style="margin-bottom:14px">📋 Grade por Dia</div>
    <div class="grid-2">
      ${days.map(d=>{
        const slots=sched.filter(s=>s.day===d).sort((a,b)=>a.period-b.period);
        if(!slots.length) return '';
        return `<div style="background:var(--bg);border-radius:10px;padding:14px">
          <div style="font-weight:800;font-size:14px;color:var(--primary);margin-bottom:10px">${DAYS[d]}</div>
          ${slots.map(s=>`<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)"><div style="font-size:12px;font-weight:700;color:var(--text-3);min-width:18px">${s.period}º</div><div><div style="font-size:13px;font-weight:700">${esc(s.subject)}</div><div style="font-size:11px;color:var(--text-3)">${s.startTime}–${s.endTime}${s.teacher?` · ${esc(s.teacher)}`:''}</div></div></div>`).join('')}
        </div>`;}).filter(Boolean).join('')}
    </div>
  </div>`;
}

function showSchedModal() {
  const sched=get('schedule'); const periods=[1,2,3,4,5,6]; const days=[0,1,2,3,4,5];
  modal(`
    <div class="modal-header"><div class="modal-title">✏️ Editar Grade de Horários</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="tabs" id="schTabs">${DAYS.map((d,i)=>`<div class="tab ${i===0?'active':''}" onclick="swSched(${i},this)">${d.slice(0,3)}</div>`).join('')}</div>
      ${days.map((d,di)=>`<div id="schDay_${d}" style="display:${di===0?'block':'none'}">
        ${periods.map(p=>{const sl=sched.find(s=>s.day===d&&s.period===p)||{};return `
          <div style="background:var(--bg);border-radius:8px;padding:12px;margin-bottom:8px">
            <div style="font-weight:700;font-size:12px;color:var(--primary);text-transform:uppercase;margin-bottom:8px">${p}º Horário</div>
            <div class="grid-2" style="gap:8px">
              <div><label class="form-label">Matéria</label><input class="form-input" id="sc_${d}_${p}_s" value="${esc(sl.subject||'')}" placeholder="Matéria"></div>
              <div><label class="form-label">Professor</label><input class="form-input" id="sc_${d}_${p}_t" value="${esc(sl.teacher||'')}" placeholder="Professor"></div>
              <div><label class="form-label">Início</label><input type="time" class="form-input" id="sc_${d}_${p}_i" value="${sl.startTime||''}"></div>
              <div><label class="form-label">Fim</label><input type="time" class="form-input" id="sc_${d}_${p}_e" value="${sl.endTime||''}"></div>
            </div>
          </div>`;}).join('')}
      </div>`).join('')}
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveSched()">💾 Salvar Grade</button></div>`);
}

function swSched(di,el) {
  document.querySelectorAll('#schTabs .tab').forEach((t,i)=>{
    t.classList.toggle('active',i===di);
    const p=document.getElementById('schDay_'+i); if(p) p.style.display=i===di?'block':'none';
  });
}

function saveSched() {
  const sched=[];
  [0,1,2,3,4,5].forEach(d=>[1,2,3,4,5,6].forEach(p=>{
    const s=document.getElementById(`sc_${d}_${p}_s`)?.value.trim();
    if(s) sched.push({id:uid(),day:d,period:p,subject:s,teacher:document.getElementById(`sc_${d}_${p}_t`)?.value.trim()||'',startTime:document.getElementById(`sc_${d}_${p}_i`)?.value||'',endTime:document.getElementById(`sc_${d}_${p}_e`)?.value||''});
  }));
  set('schedule',sched); closeModal(); toast('🕐 Grade salva!'); navigate('schedule');
}

// ──────────────────────────────────────────────────────────
// USERS
// ──────────────────────────────────────────────────────────
function renderUsers() {
  const users=get('users');
  const admins=users.filter(u=>u.role==='admin');
  const students=users.filter(u=>u.role==='student');
  return `
  <div class="page-header"><div><div class="page-title">👥 Usuários</div><div class="page-subtitle">Gerencie administradores e alunos</div></div></div>
  <div class="grid-2" style="margin-bottom:20px">
    <button class="btn btn-primary btn-full" onclick="showUserModal('admin')" style="padding:18px;font-size:15px">👑 Criar Administrador</button>
    <button class="btn btn-success btn-full" onclick="showUserModal('student')" style="padding:18px;font-size:15px">🎓 Criar Aluno</button>
  </div>
  <div class="section-divider"><span>👑 ADMINISTRADORES (${admins.length})</span></div>
  ${admins.map(u=>_userItem(u)).join('')}
  <div class="section-divider" style="margin-top:20px"><span>🎓 ALUNOS (${students.length})</span></div>
  ${!students.length?'<div class="empty-state card"><div class="es-icon">🎓</div><p>Nenhum aluno cadastrado ainda</p></div>':students.map(u=>_userItem(u)).join('')}`;
}

function _userItem(u) {
  const me=u.id===S.user.id;
  return `<div class="user-item">
    <div class="avatar" style="width:44px;height:44px;font-size:17px">${u.name[0]}</div>
    <div class="user-item-info">
      <div class="user-item-name">${esc(u.name)} ${me?'<span class="tag tag-blue" style="font-size:11px">Você</span>':''}</div>
      <div class="user-item-email">${esc(u.email)}</div>
      <div style="font-size:11px;color:var(--text-3)">Cadastrado em ${fmtDate(u.createdAt)}</div>
    </div>
    ${!me?`<button class="btn btn-sm btn-danger" onclick="delUser('${u.id}')">🗑️</button>`:''}
  </div>`;
}

function showUserModal(role) {
  const lbl=role==='admin'?'Administrador':'Aluno';
  modal(`
    <div class="modal-header"><div class="modal-title">${role==='admin'?'👑':'🎓'} Criar ${lbl}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="alert alert-info">${role==='admin'?'👑 Administradores: fazem chamada, publicam avisos, criam atividades e gerenciam a sala.':'🎓 Alunos: visualizam chamadas, avisos, atividades e participam do chat.'}</div>
      <div class="form-row"><label class="form-label">Nome completo *</label><input type="text" class="form-input" id="uName" placeholder="Nome completo"></div>
      <div class="form-row"><label class="form-label">E-mail *</label><input type="email" class="form-input" id="uEmail" placeholder="email@exemplo.com"></div>
      <div class="form-row"><label class="form-label">Senha *</label><input type="password" class="form-input" id="uPass" placeholder="Mínimo 6 caracteres"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="createUser('${role}')">✅ Criar ${lbl}</button></div>`);
}

function createUser(role) {
  const name=document.getElementById('uName').value.trim();
  const email=document.getElementById('uEmail').value.trim();
  const pass=document.getElementById('uPass').value;
  if (!name||!email||!pass) { toast('Preencha todos os campos'); return; }
  if (pass.length<6) { toast('Senha mínimo 6 caracteres'); return; }
  const users=get('users');
  if (users.find(u=>u.email.toLowerCase()===email.toLowerCase())) { toast('E-mail já cadastrado'); return; }
  users.push({id:uid(),name,email,password:pass,role,createdAt:now()});
  set('users',users); closeModal();
  toast(`✅ ${role==='admin'?'Administrador':'Aluno'} criado!`); navigate('users');
}

function delUser(id) {
  if (!confirm('Tem certeza que deseja excluir este usuário?')) return;
  set('users',get('users').filter(u=>u.id!==id)); toast('Usuário excluído'); navigate('users');
}

// ──────────────────────────────────────────────────────────
// MODAL
// ──────────────────────────────────────────────────────────
function modal(html) {
  document.getElementById('modalContainer').innerHTML =
    `<div class="modal-overlay open" id="mOvl" onclick="if(event.target.id==='mOvl')closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal() { document.getElementById('modalContainer').innerHTML=''; }

// ──────────────────────────────────────────────────────────
// BOOT
// ──────────────────────────────────────────────────────────
init();
</script>
